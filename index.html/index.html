<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B S Inter College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f4f6f9}

/* HEADER */
header{
background:#0b3d91;
color:#fff;
display:flex;
justify-content:space-between;
padding:15px 40px;
align-items:center;
}

.logo{font-size:22px;font-weight:600;}

nav a{color:#fff;margin:0 10px;text-decoration:none;}
nav a:hover{color:gold}

/* HERO */
.hero{
height:90vh;
background:linear-gradient(#0008,#0008),
url('https://images.unsplash.com/photo-1588072432836-e10032774350');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#fff;
text-align:center;
}

.hero h1{font-size:45px}
.btn{background:gold;padding:12px 25px;border:none;cursor:pointer}

/* SECTION */
.section{text-align:center;padding:60px 20px}

/* NOTICE BOARD */
.notice-board{
background:#fff;
padding:20px;
margin:20px auto;
width:80%;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.notice{
padding:10px;
border-left:5px solid gold;
margin:10px 0;
text-align:left;
}

/* HIDDEN ADMIN BUTTON */
.admin-btn{
position:fixed;
top:10px;
right:10px;
width:50px;
height:50px;
opacity:0;
cursor:pointer;
}

/* FOOTER */
footer{
background:#0b3d91;
color:#fff;
text-align:center;
padding:20px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:green;
color:#fff;
padding:15px;
border-radius:50%;
}
</style>

</head>

<body>

<header>
<div class="logo">🏫 B S Inter College</div>
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Admissions</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<h1>Welcome to B S Inter College</h1>
<p>Empowering Students for a Better Future</p>
<button class="btn">Apply Now</button>
</section>

<!-- NOTICE BOARD -->
<section class="section">
<h2>📢 Notice Board</h2>
<div class="notice-board" id="noticeBoard"></div>
</section>

<!-- HIDDEN ADMIN BUTTON -->
<div class="admin-btn" onclick="openAdmin()"></div>

<!-- FOOTER -->
<footer>
Powered by Aditya’s Dream Project | जय भोलेनाथ 🚩
</footer>

<div class="whatsapp">💬</div>

<script>

// Load saved notices
let notices = JSON.parse(localStorage.getItem("notices")) || [];

const board = document.getElementById("noticeBoard");

function renderNotices(){
board.innerHTML = "";
notices.forEach(n=>{
board.innerHTML += `<div class="notice">${n}</div>`;
});
}

renderNotices();

// Hidden admin access
function openAdmin(){
let pass = prompt("Enter Passcode");

if(pass === "8752"){
let text = prompt("Enter Notice");

if(text){
notices.push(text);
localStorage.setItem("notices", JSON.stringify(notices));
renderNotices();
}
}else{
alert("Wrong Passcode");
}
}

</script>

</body>
</html>
